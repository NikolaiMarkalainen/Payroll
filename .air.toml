root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/payroll"
  cmd = "go build -o ./tmp/payroll ./cmd/"
  delay = 800
  exclude_dir = ["bin", "tmp", "vendor", ".git"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = "./tmp/payroll -demo"
  include_dir = []
  include_ext = ["go", "toml", "yaml", "mod", "sum"]
  include_file = []
  kill_delay = "2s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
